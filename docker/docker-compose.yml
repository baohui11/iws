# IWS production deployment.
#
# Usage:
#   cd docker
#   cp .env.example .env
#   docker compose up -d
#
# App containers:
#   iws-web         Next.js web app; runs DB migrations on startup by default.
#   iws-file-worker File preview/parse/index/embedding worker.

services:
  postgres:
    image: ${POSTGRES_IMAGE:-iws-postgres:latest}
    container_name: iws-postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name=${POSTGRES_DB:-iws}
      - -c
      - cron.timezone=Asia/Shanghai
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iws}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iws_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-iws}
      TZ: Asia/Shanghai
      LANG: C.UTF-8
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iws} -d ${POSTGRES_DB:-iws}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-04-22T22-12-26Z}
    container_name: iws-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-*}
      TZ: Asia/Shanghai
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  gotenberg:
    image: ${GOTENBERG_IMAGE:-gotenberg/gotenberg:8}
    container_name: iws-gotenberg
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${GOTENBERG_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    image: ${WEB_IMAGE:-iws-web:latest}
    container_name: iws-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:-change-me-to-a-strong-random-secret}
      FILE_UPLOAD_TOKEN_SECRET: ${FILE_UPLOAD_TOKEN_SECRET:-}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-}
      RUN_DB_MIGRATIONS: ${RUN_DB_MIGRATIONS:-true}
      SEED_ADMIN_ON_STARTUP: ${SEED_ADMIN_ON_STARTUP:-true}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@iws.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin12345}
      DRIZZLE_MIGRATIONS_FOLDER: ./src/core/db/migrations
      DATABASE_URL: postgresql://${POSTGRES_USER:-iws}:${POSTGRES_PASSWORD:-iws_dev_password}@postgres:5432/${POSTGRES_DB:-iws}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_FORCE_PATH_STYLE: "true"
      S3_PROJECT_FILES_BUCKET: ${S3_PROJECT_FILES_BUCKET:-project-files}
      S3_AVATAR_BUCKET: ${S3_AVATAR_BUCKET:-avatars}
      IWS_PROJECT_FILES_MAX_BYTES: ${IWS_PROJECT_FILES_MAX_BYTES:-524288000}
      NEXT_PUBLIC_ENCRYPT_GATEWAY_APP_ID: ${NEXT_PUBLIC_ENCRYPT_GATEWAY_APP_ID:-}
      OA_PGREST_BASE_URL: ${OA_PGREST_BASE_URL:-https://mpdata01.mpgroup.cn:8081}
      OA_PGREST_TOKEN: ${OA_PGREST_TOKEN:-}
      OA_PGREST_PAGE_SIZE: ${OA_PGREST_PAGE_SIZE:-200}
      OA_PGREST_PROJECT_PAGE_SIZE: ${OA_PGREST_PROJECT_PAGE_SIZE:-500}
      OA_PGREST_PROJECT_ROLE_PAGE_SIZE: ${OA_PGREST_PROJECT_ROLE_PAGE_SIZE:-500}
      OA_SYNC_SCHEDULE_ENABLED: ${OA_SYNC_SCHEDULE_ENABLED:-true}
      OA_SYNC_SCHEDULE_CRON: ${OA_SYNC_SCHEDULE_CRON:-0 4,13 * * *}
      SMTP_HOST: ${SMTP_HOST:-smtp.exmail.qq.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-周报文件系统 <noreply@example.com>}
      SMTP_TIMEOUT_MS: ${SMTP_TIMEOUT_MS:-10000}
      SMTP_TLS_REJECT_UNAUTHORIZED: ${SMTP_TLS_REJECT_UNAUTHORIZED:-true}
      EMBEDDING_SERVICE_URL: http://file-worker:${EMBEDDING_SERVICE_PORT:-8010}
      EMBEDDING_SERVICE_TOKEN: ${EMBEDDING_SERVICE_TOKEN:-}
      TZ: Asia/Shanghai
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  file-worker:
    image: ${FILE_WORKER_IMAGE:-iws-file-worker:latest}
    container_name: iws-file-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-iws}:${POSTGRES_PASSWORD:-iws_dev_password}@postgres:5432/${POSTGRES_DB:-iws}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_FORCE_PATH_STYLE: "true"
      S3_PROJECT_FILES_BUCKET: ${S3_PROJECT_FILES_BUCKET:-project-files}
      GOTENBERG_URL: http://gotenberg:3000
      FILE_WORKER_ID: docker-file-worker
      FILE_WORKER_POLL_INTERVAL_SECONDS: ${FILE_WORKER_POLL_INTERVAL_SECONDS:-2}
      FILE_WORKER_VISIBILITY_TIMEOUT_SECONDS: ${FILE_WORKER_VISIBILITY_TIMEOUT_SECONDS:-300}
      FILE_WORKER_MAX_MESSAGES: ${FILE_WORKER_MAX_MESSAGES:-5}
      PADDLEOCR_TOKEN: ${PADDLEOCR_TOKEN:-}
      PADDLEOCR_JOB_URL: ${PADDLEOCR_JOB_URL:-https://paddleocr.aistudio-app.com/api/v2/ocr/jobs}
      PADDLEOCR_MODEL: ${PADDLEOCR_MODEL:-PaddleOCR-VL-1.6}
      PADDLEOCR_POLL_INTERVAL_SECONDS: ${PADDLEOCR_POLL_INTERVAL_SECONDS:-5}
      PADDLEOCR_MAX_WAIT_SECONDS: ${PADDLEOCR_MAX_WAIT_SECONDS:-1800}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      EMBEDDING_API_URL: ${EMBEDDING_API_URL:-https://dashscope.aliyuncs.com/api/v1/services/embeddings/text-embedding/text-embedding}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v4}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-10}
      EMBEDDING_SERVICE_HOST: 0.0.0.0
      EMBEDDING_SERVICE_PORT: ${EMBEDDING_SERVICE_PORT:-8010}
      EMBEDDING_SERVICE_TOKEN: ${EMBEDDING_SERVICE_TOKEN:-}
      TZ: Asia/Shanghai
    ports:
      - "${EMBEDDING_SERVICE_PORT:-8010}:${EMBEDDING_SERVICE_PORT:-8010}"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      gotenberg:
        condition: service_healthy

volumes:
  pg_data:
    name: iws_pg_data
  minio_data:
    name: iws_minio_data
